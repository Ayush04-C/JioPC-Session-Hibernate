handlers:
  - name: chrome
    match_pattern: "google-chrome|chromium"
    restore_strategy: flag
    restore_flag: "--restore-last-session"
    restore_supported: true

  - name: lxterminal
    match_pattern: "lxterminal"
    restore_strategy: cwd
    restore_flag: ""
    restore_supported: true

  - name: pcmanfm-qt
    match_pattern: "pcmanfm-qt|pcmanfm"
    restore_strategy: cmdline_arg
    restore_flag: ""
    restore_supported: true

  - name: libreoffice
    match_pattern: "libreoffice|soffice"
    restore_strategy: cmdline_arg
    restore_flag: ""
    restore_supported: true
