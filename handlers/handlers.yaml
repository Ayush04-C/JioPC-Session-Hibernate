# =============================================================================
# Handler Registry for JioPC Session Hibernate
#
# This file is the handler registry — a configurable master list that maps 
# applications to their capture and restore behavior. Adding a new app handler 
# requires ONLY adding a new entry to this YAML file — zero Python code changes.
#
# Keys:
# - name: string — unique identifier for the application handler (e.g. "chrome").
# - match_pattern: string — regex pattern matched against the executable path.
# - restore_strategy: string — one of: "flag", "cwd", "shell_cwd", "cmdline_arg", "cwd_arg".
#     - "flag": appends restore_flag directly when relaunching.
#     - "cwd": builds --working-directory=<cwd> using the cwd field from window data.
#     - "shell_cwd": looks up child shell processes to extract the true working directory.
#     - "cwd_arg": extracts cwd from window data and passes it as a positional argument.
#     - "cmdline_arg": extracts cmdline[1] from window data and passes it as a positional argument.
#     - "window_title_search": parses window title and searches filesystem for the document path.
# - restore_flag: string — the flag to append (use empty string "" if not applicable).
# - restore_supported: boolean — indicates if the app can be reliably restored.
# - description: string — one line explaining what this handler does.
# =============================================================================

handlers:
  - name: chrome
    match_pattern: "google-chrome|chromium"
    restore_strategy: flag
    restore_flag: "--no-sandbox --disable-gpu --restore-last-session"
    restore_supported: true
    description: "Restores Chrome. Note: Tabs require user 'Continue where I left off' setting to be enabled in Chrome."

  - name: lxterminal
    match_pattern: "lxterminal"
    restore_strategy: shell_cwd
    restore_flag: "--working-directory={shell_cwd}"
    restore_supported: true
    description: "Restores LXTerminal to its previous working directory using the shell_cwd strategy"

  - name: qterminal
    match_pattern: "qterminal"
    restore_strategy: shell_cwd
    restore_flag: "-w {shell_cwd}"
    restore_supported: true
    description: "Restores QTerminal (default LXQt terminal) to its previous working directory"

  - name: gnome-characters
    match_pattern: "gnome-characters|characters"
    restore_strategy: flag
    restore_flag: ""
    restore_supported: true
    description: "Restores GNOME Characters"

  - name: pcmanfm-qt
    match_pattern: "pcmanfm-qt|pcmanfm"
    restore_strategy: pcmanfm_title_search
    restore_flag: ""
    restore_supported: true
    description: "Restores PCManFM-Qt to the previously open folder by parsing the window title"

  - name: libreoffice
    match_pattern: "libreoffice|soffice"
    restore_strategy: window_title_search
    restore_flag: ""
    restore_supported: true
    description: "Restores LibreOffice with the previously open document using window_title_search"

  - name: gnome-disks
    match_pattern: "gnome-disks|disks"
    restore_strategy: flag
    restore_flag: ""
    restore_supported: true
    description: "Restores the GNOME Disks utility"

